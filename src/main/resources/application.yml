spring:
  application:
    name: ai-writing-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  flyway:
    # 운영 DB처럼 flyway_schema_history 테이블 없이 이미 테이블이 있는 스키마에서도
    # 안전하게 시작할 수 있도록, 첫 실행 시 자동으로 baseline을 잡는다.
    baseline-on-migrate: true
    baseline-version: 0
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            # Google Cloud Console 승인된 리디렉션 URI와 동일해야 함
            # 로컬: http://localhost:8080/login/oauth2/code/google
            # 운영: https://api.novelnestia.com/login/oauth2/code/google (server.forward-headers-strategy로 baseUrl 인식)
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 3600000      # 1시간
  refresh-expiration: 2592000000  # 30일

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4.1-mini

app:
  password-reset:
    code-expiration-minutes: 5
    resend-cooldown-seconds: 60
    token-expiration-minutes: 10
    email-subject: "[NovelNest] 비밀번호 재설정 인증번호"
  cleanup:
    verification-cron: "0 0 * * * *" # 매 정각 실행
  async:
    email:
      core-pool-size: 2
      max-pool-size: 5
      queue-capacity: 100
      thread-name-prefix: "email-async-"
  ai:
    chat:
      max-output-tokens: ${AI_CHAT_MAX_OUTPUT_TOKENS:700}
    conflict:
      max-output-tokens: ${AI_CONFLICT_MAX_OUTPUT_TOKENS:1200}
    context:
      # AI 채팅/설정 충돌 감지에 전달할 회차 요약 개수, 등장인물·세계관 최대 개수,
      # 참고 데이터 전체 문자 수 상한 — 회차가 아무리 많아져도 이 값을 넘지 않는다.
      chat-recent-episode-count: ${AI_CHAT_RECENT_EPISODE_COUNT:10}
      conflict-recent-episode-count: ${AI_CONFLICT_RECENT_EPISODE_COUNT:5}
      max-character-count: ${AI_CONTEXT_MAX_CHARACTER_COUNT:200}
      max-worldview-count: ${AI_CONTEXT_MAX_WORLDVIEW_COUNT:400}
      max-context-characters: ${AI_CONTEXT_MAX_CHARACTERS:50000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    org.example: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
