spring:
  application:
    name: ai-writing-platform
  profiles:
    active: local

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 3600000     # 1시간
  refresh-expiration: 604800000  # 7일

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4.1-mini

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
